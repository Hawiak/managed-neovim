name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: Darwin
            goos: darwin
            goarch: arm64
          - os: Darwin
            goos: darwin
            goarch: amd64
          - os: Linux
            goos: linux
            goarch: arm64
          - os: Linux
            goos: linux
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          MANIFEST_PUBLIC_KEY: ${{ secrets.MANIFEST_PUBLIC_KEY }}
        run: |
          name="nvim-wrapper-${{ matrix.os }}-${{ matrix.goarch }}"
          go build \
            -ldflags="-X main.manifestPublicKey=${MANIFEST_PUBLIC_KEY}" \
            -o "${name}" \
            ./cmd/nvim-wrapper/
          sha256sum "${name}" > "${name}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nvim-wrapper-${{ matrix.os }}-${{ matrix.goarch }}
          path: |
            nvim-wrapper-${{ matrix.os }}-${{ matrix.goarch }}
            nvim-wrapper-${{ matrix.os }}-${{ matrix.goarch }}.sha256

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nvim-wrapper-Darwin-arm64
            nvim-wrapper-Darwin-arm64.sha256
            nvim-wrapper-Darwin-amd64
            nvim-wrapper-Darwin-amd64.sha256
            nvim-wrapper-Linux-arm64
            nvim-wrapper-Linux-arm64.sha256
            nvim-wrapper-Linux-amd64
            nvim-wrapper-Linux-amd64.sha256
          generate_release_notes: true
